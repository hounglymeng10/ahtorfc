<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AHTOR FC — Admin Panel</title>
<link rel="icon" type="image/png" href="LOGO2.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  @font-face { font-family:'MiSans Khmer'; src:url('MiSansKhmer-Medium.ttf') format('truetype'); font-weight:500; }
  :root {
    --green:#1B6B2F; --green3:#0d4a1f; --yellow:#F4C430; --gold:#D4A017;
    --white:#FFFFFF; --dark:#0e1a10; --red:#c0392b; --blue:#1565C0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'MiSans Khmer','Barlow',sans-serif; background:var(--dark); color:var(--white); min-height:100vh; }

  /* ── LOGIN ── */
  #loginScreen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(160deg,rgba(14,26,16,0.95),rgba(27,107,47,0.3),rgba(14,26,16,0.98));
    background-color:var(--green3);
  }
  .login-box {
    background:rgba(14,26,16,0.9); border:1px solid rgba(27,107,47,0.4);
    border-top:3px solid var(--yellow); padding:48px 40px; width:100%; max-width:400px;
  }
  .login-box .logo { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:3px; color:var(--white); margin-bottom:4px; }
  .login-box .logo span { color:var(--yellow); }
  .login-box .sub { font-size:11px; letter-spacing:3px; color:rgba(255,255,255,0.35); text-transform:uppercase; margin-bottom:36px; }
  .login-err { background:rgba(192,57,43,0.15); border:1px solid rgba(192,57,43,0.4); border-left:3px solid var(--red); padding:10px 14px; font-size:13px; color:#e74c3c; margin-bottom:20px; display:none; }

  /* ── MAIN ── */
  #adminScreen { display:none; min-height:100vh; }

  nav {
    position:sticky; top:0; z-index:100;
    background:rgba(14,26,16,0.97); backdrop-filter:blur(12px);
    border-bottom:2px solid var(--green);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 32px; height:60px;
  }
  .nav-logo { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; color:var(--white); }
  .nav-logo span { color:var(--yellow); }
  .nav-right { display:flex; align-items:center; gap:16px; }
  .nav-badge { background:rgba(27,107,47,0.3); border:1px solid rgba(27,107,47,0.5); color:var(--yellow); font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:4px 12px; }
  .btn-logout { background:transparent; border:1px solid rgba(192,57,43,0.4); color:rgba(255,255,255,0.4); font-family:'MiSans Khmer',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:6px 14px; cursor:pointer; transition:all 0.2s; }
  .btn-logout:hover { border-color:var(--red); color:var(--red); }

  .admin-wrap { display:grid; grid-template-columns:1fr 420px; gap:0; min-height:calc(100vh - 60px); }

  /* ── FORM PANEL ── */
  .form-panel { padding:32px; border-right:1px solid rgba(27,107,47,0.15); }
  .panel-title { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px; color:var(--white); margin-bottom:4px; }
  .panel-sub { font-size:11px; color:rgba(255,255,255,0.3); letter-spacing:2px; text-transform:uppercase; margin-bottom:28px; }

  .form-row { margin-bottom:20px; }
  .form-row label { display:block; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:8px; }
  .form-row input,
  .form-row select,
  .form-row textarea {
    width:100%; background:rgba(255,255,255,0.04); border:1px solid rgba(27,107,47,0.3);
    border-radius:0; color:var(--white); font-family:'MiSans Khmer','Barlow',sans-serif;
    font-size:14px; padding:12px 14px; outline:none;
    transition:border-color 0.2s, background 0.2s;
  }
  .form-row input:focus,
  .form-row select:focus,
  .form-row textarea:focus { border-color:var(--yellow); background:rgba(244,196,48,0.04); }
  .form-row textarea { resize:vertical; min-height:160px; line-height:1.6; }
  .form-row select option { background:#0e1a10; }

  .form-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

  /* Image upload */
  .img-upload-zone {
    border:2px dashed rgba(27,107,47,0.35); padding:24px; text-align:center;
    cursor:pointer; transition:border-color 0.2s, background 0.2s;
    position:relative;
  }
  .img-upload-zone:hover, .img-upload-zone.dragover { border-color:var(--yellow); background:rgba(244,196,48,0.04); }
  .img-upload-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .img-upload-icon { font-size:32px; margin-bottom:8px; opacity:0.5; }
  .img-upload-zone p { font-size:12px; color:rgba(255,255,255,0.35); }
  .img-upload-zone p strong { color:var(--yellow); }
  #imgPreview { width:100%; max-height:180px; object-fit:cover; margin-top:12px; display:none; }

  /* Progress */
  .upload-progress { margin-top:10px; display:none; }
  .progress-bar { height:3px; background:rgba(27,107,47,0.2); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--yellow); width:0%; transition:width 0.3s; }
  .progress-label { font-size:11px; color:rgba(255,255,255,0.35); margin-top:4px; }

  /* Submit button */
  .btn-submit {
    width:100%; background:var(--yellow); color:var(--dark);
    font-family:'MiSans Khmer',sans-serif; font-size:14px; font-weight:800;
    letter-spacing:2px; text-transform:uppercase; border:none; cursor:pointer;
    padding:16px; transition:background 0.2s, transform 0.15s; margin-top:8px;
  }
  .btn-submit:hover:not(:disabled) { background:var(--gold); transform:translateY(-1px); }
  .btn-submit:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

  .form-msg { margin-top:14px; padding:12px 16px; font-size:13px; border-left:3px solid; display:none; }
  .form-msg.success { background:rgba(27,107,47,0.15); border-color:var(--green); color:#4caf50; }
  .form-msg.error { background:rgba(192,57,43,0.15); border-color:var(--red); color:#e74c3c; }

  /* ── POSTS PANEL ── */
  .posts-panel { background:#080f09; padding:24px; overflow-y:auto; max-height:calc(100vh - 60px); }
  .posts-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .posts-count { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; color:var(--white); }
  .posts-count span { color:var(--yellow); }
  .post-search { background:rgba(255,255,255,0.04); border:1px solid rgba(27,107,47,0.25); color:var(--white); font-size:12px; padding:7px 12px; outline:none; width:160px; }
  .post-search:focus { border-color:rgba(244,196,48,0.4); }

  /* Post item */
  .post-item {
    background:rgba(27,107,47,0.06); border:1px solid rgba(27,107,47,0.15);
    border-left:3px solid var(--green); padding:14px; margin-bottom:10px;
    transition:border-color 0.2s;
  }
  .post-item:hover { border-left-color:var(--yellow); }
  .pi-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:6px; }
  .pi-title { font-size:13px; font-weight:600; color:var(--white); line-height:1.3; flex:1; }
  .pi-actions { display:flex; gap:6px; flex-shrink:0; }
  .pi-btn { background:none; border:1px solid; font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:4px 8px; cursor:pointer; transition:all 0.2s; }
  .pi-btn.edit { border-color:rgba(27,107,47,0.4); color:rgba(255,255,255,0.4); }
  .pi-btn.edit:hover { border-color:var(--green); color:var(--white); }
  .pi-btn.del { border-color:rgba(192,57,43,0.3); color:rgba(192,57,43,0.5); }
  .pi-btn.del:hover { border-color:var(--red); color:var(--red); }
  .pi-meta { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .pi-cat { font-size:9px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; padding:2px 7px; }
  .cat-match    { background:#C0392B22; color:#e57373; border:1px solid #C0392B44; }
  .cat-schedule { background:#1565C022; color:#64B5F6; border:1px solid #1565C044; }
  .cat-news     { background:#1B6B2F22; color:#81C784; border:1px solid #1B6B2F44; }
  .cat-training { background:#6A1B9A22; color:#CE93D8; border:1px solid #6A1B9A44; }
  .cat-announce { background:#F4C43022; color:#FFD54F; border:1px solid #F4C43044; }
  .cat-event    { background:#E6510022; color:#FFB74D; border:1px solid #E6510044; }
  .pi-date { font-size:10px; color:rgba(255,255,255,0.25); }
  .pi-excerpt { font-size:11px; color:rgba(255,255,255,0.3); line-height:1.5; margin-top:6px; }

  .posts-empty { text-align:center; padding:48px 20px; }
  .posts-empty .ei { font-size:48px; opacity:0.2; margin-bottom:12px; }
  .posts-empty p { font-size:12px; color:rgba(255,255,255,0.2); }

  .posts-loading { text-align:center; padding:48px; }
  .spinner { width:32px; height:32px; border:2px solid rgba(27,107,47,0.3); border-top-color:var(--green); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* Shared input style */
  input[type="text"], input[type="password"], input[type="date"] {
    -webkit-appearance:none; appearance:none;
  }

  /* ── RESPONSIVE ── */
  @media(max-width:900px) {
    .admin-wrap { grid-template-columns:1fr; }
    .form-panel { border-right:none; border-bottom:1px solid rgba(27,107,47,0.15); }
    .posts-panel { max-height:none; }
  }
  @media(max-width:480px) {
    nav { padding:0 16px; }
    .form-panel { padding:20px 16px; }
    .form-grid2 { grid-template-columns:1fr; }
    .posts-panel { padding:16px; }
  }
</style>
</head>
<body>

<!-- ══════════════════ LOGIN SCREEN ══════════════════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="logo">AHTOR <span>FC</span></div>
    <div class="sub">Admin Panel · Restricted Access</div>
    <div class="login-err" id="loginErr">❌ Password incorrect. Try again.</div>
    <div class="form-row">
      <label>Password</label>
      <input type="password" id="pwInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-submit" onclick="doLogin()" style="margin-top:0">Enter Admin Panel →</button>
  </div>
</div>

<!-- ══════════════════ ADMIN SCREEN ══════════════════ -->
<div id="adminScreen">
  <nav>
    <div class="nav-logo">AHTOR <span>FC</span> <span style="font-size:14px;opacity:0.4;letter-spacing:1px;">· ADMIN</span></div>
    <div class="nav-right">
      <div class="nav-badge">✓ Logged In</div>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </nav>

  <div class="admin-wrap">
    <!-- LEFT: Post Form -->
    <div class="form-panel">
      <div class="panel-title" id="formTitle">NEW POST</div>
      <div class="panel-sub" id="formSub">Create a new blog entry</div>

      <input type="hidden" id="editId">

      <div class="form-row">
        <label>Post Title *</label>
        <input type="text" id="fTitle" placeholder="e.g. AHTOR FC vs Team X — 3:1 Win!">
      </div>

      <div class="form-grid2">
        <div class="form-row">
          <label>Category *</label>
          <select id="fCat">
            <option value="match">⚽ Match Results</option>
            <option value="schedule">📅 Schedule</option>
            <option value="news" selected>📰 News</option>
            <option value="training">🏋️ Training</option>
            <option value="announce">📢 Announcement</option>
            <option value="event">🏆 Event</option>
          </select>
        </div>
        <div class="form-row">
          <label>Date *</label>
          <input type="date" id="fDate">
        </div>
      </div>

      <div class="form-row">
        <label>Content *</label>
        <textarea id="fContent" placeholder="Write your post here... &#10;&#10;You can write in Khmer or English.&#10;Line breaks are preserved."></textarea>
      </div>

      <div class="form-row">
        <label>Image (optional)</label>
        <div class="img-upload-zone" id="uploadZone">
          <input type="file" id="fImg" accept="image/*" onchange="previewImg(this)">
          <div class="img-upload-icon">📷</div>
          <p><strong>Click or drag</strong> to upload image</p>
          <p>JPG, PNG, WebP · Max 5MB</p>
          <img id="imgPreview">
        </div>
        <div class="upload-progress" id="uploadProgress">
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <div class="progress-label" id="progressLabel">Uploading...</div>
        </div>
      </div>

      <button class="btn-submit" id="submitBtn" onclick="submitPost()">
        <span id="submitLabel">✚ Publish Post</span>
      </button>
      <button id="cancelEdit" style="display:none;width:100%;margin-top:8px;background:transparent;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);padding:12px;cursor:pointer;font-family:'MiSans Khmer',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;" onclick="cancelEditMode()">✕ Cancel Edit</button>

      <div class="form-msg" id="formMsg"></div>
    </div>

    <!-- RIGHT: Posts List -->
    <div class="posts-panel">
      <div class="posts-header">
        <div class="posts-count">Posts <span id="postsCount">—</span></div>
        <input class="post-search" type="text" placeholder="Search..." oninput="searchPosts(this.value)">
      </div>
      <div id="postsList">
        <div class="posts-loading"><div class="spinner"></div><p style="font-size:12px;color:rgba(255,255,255,0.2);">Loading posts...</p></div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, orderBy, query, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ══════════════════════════════════════════════════════
//  🔥 PASTE YOUR FIREBASE CONFIG HERE
// ══════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyCV9ytKMwWRX6_kWpmg3S_OflqQlcmDum0",
  authDomain: "ahtor-fc.firebaseapp.com",
  projectId: "ahtor-fc",
  storageBucket: "ahtor-fc.firebasestorage.app",
  messagingSenderId: "250669078367",
  appId: "1:250669078367:web:7dd361df438afeb3a448ea"
};
// ══════════════════════════════════════════════════════

const ADMIN_PASSWORD = "ahtor2026"; // 🔑 Change this!

// ══════════════════════════════════════════════════════
//  ☁️ CLOUDINARY — FREE image hosting (25GB)
//  1. cloudinary.com → Sign up free
//  2. Dashboard → copy your "Cloud name"
//  3. Settings → Upload → Add upload preset → Unsigned → Save
// ══════════════════════════════════════════════════════
const CLOUDINARY_CLOUD  = "dhtytdnid";
const CLOUDINARY_PRESET = "ahtor_blog";
// ══════════════════════════════════════════════════════

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let allPostsCache = [];
let currentImgUrl = null;

// ── LOGIN ──
window.doLogin = function() {
  const pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
    loadPosts();
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
};

window.doLogout = function() {
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pwInput').value = '';
};

// ── IMAGE PREVIEW ──
window.previewImg = function(input) {
  const file = input.files[0];
  if (!file) return;
  const preview = document.getElementById('imgPreview');
  preview.src = URL.createObjectURL(file);
  preview.style.display = 'block';
};

// Drag & drop
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    document.getElementById('fImg').files = e.dataTransfer.files;
    previewImg(document.getElementById('fImg'));
  }
});

// ── UPLOAD IMAGE via Cloudinary ──
async function uploadImage(file) {
  document.getElementById('uploadProgress').style.display = 'block';
  document.getElementById('progressFill').style.width = '30%';
  document.getElementById('progressLabel').textContent = 'Uploading to Cloudinary...';

  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', CLOUDINARY_PRESET);
  formData.append('folder', 'ahtor-blog');

  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
    method: 'POST',
    body: formData
  });

  document.getElementById('progressFill').style.width = '90%';

  if (!res.ok) throw new Error('Cloudinary upload failed');
  const data = await res.json();

  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = 'Upload complete!';

  return data.secure_url;
}

// ── SUBMIT POST ──
window.submitPost = async function() {
  const title   = document.getElementById('fTitle').value.trim();
  const cat     = document.getElementById('fCat').value;
  const date    = document.getElementById('fDate').value;
  const content = document.getElementById('fContent').value.trim();
  const imgFile = document.getElementById('fImg').files[0];
  const editId  = document.getElementById('editId').value;

  if (!title || !date || !content) {
    showMsg('error', '⚠️ Please fill in Title, Date, and Content.');
    return;
  }

  const btn = document.getElementById('submitBtn');
  const lbl = document.getElementById('submitLabel');
  btn.disabled = true;
  lbl.textContent = 'Publishing...';

  try {
    let imgUrl = currentImgUrl || null;

    if (imgFile) {
      imgUrl = await uploadImage(imgFile);
    }

    const postData = { title, cat, date, content, img: imgUrl, updatedAt: serverTimestamp() };

    if (editId) {
      await updateDoc(doc(db, 'posts', editId), postData);
      showMsg('success', '✓ Post updated successfully!');
    } else {
      postData.createdAt = serverTimestamp();
      await addDoc(collection(db, 'posts'), postData);
      showMsg('success', '✓ Post published successfully!');
    }

    resetForm();
    loadPosts();
  } catch (err) {
    showMsg('error', '❌ Error: ' + err.message);
  } finally {
    btn.disabled = false;
    lbl.textContent = editId ? '✓ Update Post' : '✚ Publish Post';
    document.getElementById('uploadProgress').style.display = 'none';
  }
};

function resetForm() {
  document.getElementById('fTitle').value   = '';
  document.getElementById('fContent').value = '';
  document.getElementById('fImg').value     = '';
  document.getElementById('imgPreview').style.display = 'none';
  document.getElementById('imgPreview').src = '';
  document.getElementById('fDate').value    = new Date().toISOString().split('T')[0];
  document.getElementById('fCat').value     = 'news';
  document.getElementById('editId').value   = '';
  currentImgUrl  = null;
}

// ── LOAD POSTS ──
async function loadPosts() {
  try {
    const q    = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    allPostsCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderPostsList(allPostsCache);
  } catch (err) {
    document.getElementById('postsList').innerHTML =
      `<p style="color:rgba(255,0,0,0.5);font-size:12px;padding:20px;">Error loading posts. Check Firebase config.</p>`;
  }
}

function renderPostsList(posts) {
  document.getElementById('postsCount').textContent = posts.length;
  if (posts.length === 0) {
    document.getElementById('postsList').innerHTML = `
      <div class="posts-empty"><div class="ei">📭</div><p>No posts yet. Create your first one!</p></div>`;
    return;
  }
  document.getElementById('postsList').innerHTML = posts.map(p => `
    <div class="post-item">
      <div class="pi-top">
        <div class="pi-title">${p.title}</div>
        <div class="pi-actions">
          <button class="pi-btn edit" onclick="editPost('${p.id}')">Edit</button>
          <button class="pi-btn del"  onclick="deletePost('${p.id}')">Del</button>
        </div>
      </div>
      <div class="pi-meta">
        <span class="pi-cat cat-${p.cat}">${p.cat}</span>
        <span class="pi-date">📅 ${p.date}</span>
      </div>
      <div class="pi-excerpt">${(p.content||'').substring(0,100)}${(p.content||'').length>100?'...':''}</div>
    </div>`).join('');
}

// ── SEARCH ──
window.searchPosts = function(q) {
  if (!q) { renderPostsList(allPostsCache); return; }
  const filtered = allPostsCache.filter(p =>
    p.title.toLowerCase().includes(q.toLowerCase()) ||
    (p.content||'').toLowerCase().includes(q.toLowerCase())
  );
  renderPostsList(filtered);
};

// ── EDIT ──
window.editPost = function(id) {
  const p = allPostsCache.find(x => x.id === id);
  if (!p) return;
  document.getElementById('fTitle').value   = p.title;
  document.getElementById('fCat').value     = p.cat;
  document.getElementById('fDate').value    = p.date;
  document.getElementById('fContent').value = p.content;
  document.getElementById('editId').value   = id;
  currentImgUrl  = p.img || null;

  if (p.img) {
    const preview = document.getElementById('imgPreview');
    preview.src   = p.img;
    preview.style.display = 'block';
  }

  document.getElementById('formTitle').textContent = 'EDIT POST';
  document.getElementById('formSub').textContent   = 'Updating existing entry';
  document.getElementById('submitLabel').textContent = '✓ Update Post';
  document.getElementById('cancelEdit').style.display = 'block';
  document.querySelector('.form-panel').scrollIntoView({ behavior:'smooth' });
};

window.cancelEditMode = function() {
  resetForm();
  document.getElementById('formTitle').textContent   = 'NEW POST';
  document.getElementById('formSub').textContent     = 'Create a new blog entry';
  document.getElementById('submitLabel').textContent = '✚ Publish Post';
  document.getElementById('cancelEdit').style.display = 'none';
};

// ── DELETE ──
window.deletePost = async function(id) {
  if (!confirm('Delete this post? This cannot be undone.')) return;
  try {
    await deleteDoc(doc(db, 'posts', id));
    loadPosts();
  } catch (err) {
    alert('Error deleting: ' + err.message);
  }
};

// ── MSG ──
function showMsg(type, text) {
  const el = document.getElementById('formMsg');
  el.className = `form-msg ${type}`;
  el.textContent = text;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}
</script>
</body>
